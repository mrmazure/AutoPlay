<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta content="https://autoplay.radiotools.be/seo_rtbe.png" property="og:image">
    <meta content="1280" property="og:image:width">
    <meta content="720" property="og:image:height">
    <meta content="summary_large_image" name="twitter:card">
    <meta content="https://autoplay.radiotools.be/seo_rtbe.png" name="twitter:image">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>RadioTools – AutoPlay by MrMazure</title>
    <link href="favicon.png" rel="icon" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AutoPlay">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <header id="top-header">
        <div class="logo-container">
            <img alt="Logo" class="logo" src="rt_logo_head.png">
            <h1 class="title">RadioTools <span class="subtitle">| AutoPlay By MrMazure</span></h1>
        </div>
        <div class="header-controls">
            <div class="output-group">
                <span class="out-label">Pré-écoute :</span>
                <button id="previewOutputBtn" class="audio-output-btn" title="Choisir la carte son de pré-écoute (PFL)">
                    🎧 Par défaut
                </button>
            </div>
            <div class="output-group">
                <span class="out-label">Sortie principale :</span>
                <button id="audioOutputBtn" class="audio-output-btn" title="Choisir la carte son de sortie de l'automate">
                    🔊 Par défaut
                </button>
            </div>
        </div>
    </header>

    <div id="app">
        <aside id="left-panel">
            <div id="left-header">
                <h2 class="section-title">Playlist</h2>
                <div class="playlist-actions">
                    <button id="add-btn" title="Ajouter des fichiers" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <button id="add-folder-btn" title="Ajouter un dossier (fichier aléatoire)" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            <line x1="12" y1="11" x2="12" y2="17"></line>
                            <line x1="9" y1="14" x2="15" y2="14"></line>
                        </svg>
                    </button>
                    <button id="loop-playlist-btn" title="Conserver les fichiers après lecture (boucle)" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </button>
                    <button id="add-stream-btn" title="Ajouter un flux streaming" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                    </button>
                    <button id="shuffle-btn" title="Mélanger les fichiers" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 3 21 3 21 8"></polyline>
                            <line x1="4" y1="20" x2="21" y2="3"></line>
                            <polyline points="21 16 21 21 16 21"></polyline>
                            <line x1="15" y1="15" x2="21" y2="21"></line>
                            <line x1="4" y1="4" x2="9" y2="9"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="drop-hint">
                <div class="drop-icon">📂</div>
                <span>Déposez vos fichiers audio ici</span>
            </div>

            <ul id="queue"></ul>

            <div id="playlist-io">
                <button id="save-playlist-btn" class="pl-io-btn" title="Sauvegarder la playlist (ordre + points de mix) dans un fichier JSON">💾 Sauver</button>
                <button id="load-playlist-btn" class="pl-io-btn" title="Charger une playlist depuis un fichier JSON">📂 Charger</button>
            </div>
        </aside>

        <section id="right-panel">
            <div id="header-bar">
                <div class="system-info">
                    <span class="label">HEURE</span>
                    <div id="clock">--:--:--</div>
                </div>

                <div class="main-controls">
                    <button id="stop-end-btn" title="Activer/désactiver Auto next" class="control-btn toggle-btn">
                        <span class="icon">🔄</span> Auto next
                    </button>
                    <button id="loop-btn" title="Mode Boucle – la liste d'attente tourne en rotation non-stop" class="control-btn toggle-btn">
                        <span class="icon">🔁</span> Boucle
                    </button>
                    <button id="stop-btn" title="Stop" class="control-btn stop-btn">
                        <span class="icon">⏹</span> STOP
                    </button>
                    <button id="play-btn" title="Play" class="control-btn play-btn">
                        <span class="icon">▶</span> PLAY
                    </button>
                    <button id="pause-btn" title="Pause" class="control-btn pause-btn">
                        <span class="icon">⏸</span> PAUSE
                    </button>
                    <button id="next-btn" title="Passer au titre suivant" class="control-btn next-btn">
                        <span class="icon">⏭</span> NEXT
                    </button>
                </div>

                <div class="volume-control">
                    <span class="vol-icon" title="Volume">🔊</span>
                    <input id="volume" max="1" min="0" step="0.01" type="range" value="1">
                </div>
            </div>

            <div class="player-container">
                <div id="now-playing">
                    <canvas id="visualizer"></canvas>
                    <div class="track-info">
                        <div id="now-label">EN COURS</div>
                        <div id="now-title">–</div>
                    </div>
                    <div class="time-display">
                        <div id="time-meta" data-total="0">00:00 / 00:00</div>
                    </div>
                </div>

                <div id="progress">
                    <canvas id="waveform"></canvas>
                    <!-- <div id="progress-bar"></div> -->
                </div>

                <!-- Décompte d'intro en sur-impression : ne prend pas de place -->
                <div id="intro-countdown" hidden></div>
            </div>

            <div id="up-next">
                <span class="next-label">SUIVANT:</span> <span id="next-track-name">–</span>
            </div>

            <audio id="player1"></audio>
            <audio id="player2"></audio>
            <audio id="player3"></audio>
            <audio id="player-stream"></audio>
            <!-- Pré-écoute (PFL) : routés vers une 2e carte son, hors antenne -->
            <audio id="player-preview-a"></audio>
            <audio id="player-preview-b"></audio>
            <audio id="player-preview-c"></audio>

            <div id="history">
                <h3 class="section-title">Historique</h3>
                <ul id="history-list"></ul>
            </div>
        </section>
    </div>

    <script src="js/main.js" type="module"></script>
</body>

</html>
